name: Build Mac

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build Mac (Intel + M1/M2)
        run: |
          npm run electron:build:mac
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/OCT-*-Mac-x64.dmg
            release/OCT-*-Mac-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
